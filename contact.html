<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | SMRG Consulting</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">SMRG CONSULTING</a>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="services.html">SERVICES</a></li>
        <li><a href="contact.html">CONTACT</a></li>
      </ul>
    </div>
  </header>

  <section class="bg-dark" style="text-align: center; padding: 4rem 0;">
    <div class="container">
      <h1>Let's Talk Operations.</h1>
      <p>Complete the form below to help us understand your baseline.</p>
    </div>
  </section>

  <section class="bg-white">
    <div class="container" style="max-width: 700px;">
      
      <form action="#" method="POST" id="leadEngineForm">
        
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Company / Organization Name</label>
          <input type="text" name="company" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Industry</label>
          <select name="industry" class="form-control" required>
            <option value="" disabled selected>Select your industry...</option>
            <option value="Law Firm">Law Firm</option>
            <option value="Childcare">Childcare Organization</option>
            <option value="Nonprofit">Nonprofit</option>
            <option value="Small Business">Small Business</option>
            <option value="Professional Services">Professional Services</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">How can we help you?</label>
          <select name="inquiry_type" id="inquiryType" class="form-control" required>
            <option value="" disabled selected>Select inquiry type...</option>
            <option value="Consulting Services">Consulting Services (Operational AI Assessment)</option>
            <option value="Pilot Program">Pilot Program (Software Solutions)</option>
            <option value="Partner Program">Partner Program</option>
            <option value="General Inquiry">General Inquiry</option>
          </select>
        </div>

        <div id="assessment-section">
          <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Operational Baseline Assessment</h3>
          <p style="font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--text-light);">To make the most of our consultation, please answer these four brief questions.</p>
          
          <div class="form-group">
            <label class="form-label">1. What is your organization's primary operational bottleneck?</label>
            <select name="q1_bottleneck" class="form-control">
              <option value="Inconsistent intake">Inconsistent intake processes</option>
              <option value="Knowledge hoarding">Knowledge hoarding & staff turnover</option>
              <option value="Outdated software">Outdated software & manual processes</option>
              <option value="Rapid growth">Rapid growth outstripping current systems</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">2. How is your critical institutional knowledge currently stored?</label>
            <select name="q2_knowledge" class="form-control">
              <option value="Employees heads">Mostly in employees' heads</option>
              <option value="Scattered">Scattered across emails and documents</option>
              <option value="Partially documented">Partially documented but rarely updated</option>
              <option value="Highly structured">Highly structured but inefficient</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">3. Have you attempted to implement AI or automation tools previously?</label>
            <select name="q3_ai_attempt" class="form-control">
              <option value="Yes Successfully">Yes, Successfully</option>
              <option value="Yes Unsuccessfully">Yes, Unsuccessfully</option>
              <option value="No Looking to start">No, Looking to start</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">4. What is your timeline for modernizing these operational systems?</label>
            <select name="q4_timeline" class="form-control">
              <option value="Immediately">Immediately</option>
              <option value="1-3 Months">1-3 Months</option>
              <option value="3-6 Months">3-6 Months</option>
              <option value="Just exploring">Just exploring</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; margin-top: 1rem;">Secure My Consultation</button>

      </form>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const inquirySelect = document.getElementById('inquiryType');
      const assessmentSection = document.getElementById('assessment-section');

      inquirySelect.addEventListener('change', function() {
        // Show the 4-question assessment ONLY if they select Consulting or Pilot
        if (this.value === 'Consulting Services' || this.value === 'Pilot Program') {
          assessmentSection.style.display = 'block';
        } else {
          assessmentSection.style.display = 'none';
        }
      });
    });
  </script>

</body>
</html>
